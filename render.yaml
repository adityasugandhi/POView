services:
  - type: redis
    name: gods-eye-redis
    plan: free
    maxmemoryPolicy: noeviction

  - type: web
    name: gods-eye-backend
    runtime: docker
    dockerfilePath: ./backend/Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: GOOGLE_MAPS_API_KEY
        sync: false
      - key: GEMINI_API_KEY
        sync: false
      - key: ALLOWED_ORIGINS
        sync: false
      - key: REDIS_URL
        fromService:
          type: redis
          name: gods-eye-redis
          property: connectionString
